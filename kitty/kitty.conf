# BEGIN_KITTY_FONTS
font_family      family="Fira Code"
bold_font        auto
italic_font      auto
bold_italic_font auto
# END_KITTY_FONTS

# font
font_size 12.0
adjust_line_height 1
disable_ligatures cursor

# Nerd Fonts v3.2.0
symbol_map U+e000-U+e00a,U+ea60-U+ebeb,U+e0a0-U+e0c8,U+e0ca,U+e0cc-U+e0d7,U+e200-U+e2a9,U+e300-U+e3e3,U+e5fa-U+e6b1,U+e700-U+e7c5,U+ed00-U+efc1,U+f000-U+f2ff,U+f000-U+f2e0,U+f300-U+f372,U+f400-U+f533,U+f0001-U+f1af0 Hack Regular Nerd Font Complete

enable_audio_bell no
enabled_layouts tall:bias=50;full_size=1;mirrored=false, Horizontal

#┌──────────────┬───────────────┐
#│              │               │
#│              │               │
#│              │               │
#│              ├───────────────┤
#│              │               │
#│              │               │
#│              ├───────────────┤
#│              │               │
#│              │               │
#│              │               │
#└──────────────┴───────────────┘
 # # My custom shortcuts 
map Ctrl+C copy_or_interrupt
map Ctrl+V paste_from_clipboard
#map ctrl+left neighboring_window left
#map ctrl+right  neighboring_window right
#map super+q close_window
map ctrl+shift+u kitten unicode_input
###

# window settings 
confirm_os_window_close 0
remember_window_size  no
initial_window_width  140c
initial_window_height 38c
# foreground #C0CAF5
# background #1A1B26
background_opacity 0.92 
# cursor #C0CAF5
shell_integration  no-cursor
cursor_shape block

#Tabs
tab_bar_edge top
tab_bar_style powerline
map ctrl+left next_tab
map ctrl+right  previous_tab
map alt+t new_tab
map alt+q close_tab

# BEGIN_KITTY_THEME
# Tokyo Night
include current-theme.conf
# END_KITTY_THEME
